<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Eliaga — Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    body { font-family: 'Inter', sans-serif; min-height: 100vh; }
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { 
        background: white; 
        border-radius: 20px; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        width: 100%; 
        max-width: 420px; 
        padding: 40px; 
    }
    .school-logo { width: 80px; height: auto; margin-bottom: 20px; }
    .btn-login { padding: 12px; border-radius: 10px; font-weight: 600; transition: all 0.3s; }
  </style>
</head>
<body class="bg-light">

  <div class="container login-container">
    <div class="login-card">
      
      <div class="text-center">
        <img src="Assets/Acloga.png" alt="Logo" class="school-logo">
        
        <h3 class="fw-bold text-dark">Student Login</h3>
        <p class="text-muted mb-4">Developed by: Michael Eliaga</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label small fw-bold text-secondary">Full Name</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
            <input type="text" id="nameInput" class="form-control border-start-0" placeholder="Enter your full name" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold text-secondary">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
            <input type="email" id="emailInput" class="form-control border-start-0" placeholder="name@university.edu" required>
          </div>
        </div>

        <div class="mb-2">
          <div class="d-flex justify-content-between">
            <label class="form-label small fw-bold text-secondary">Password</label>
            <a href="#" class="text-decoration-none small fw-bold">Forgot?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" id="passwordInput" class="form-control border-start-0" placeholder="••••••••" required>
          </div>
        </div>

        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" id="rememberMe">
          <label class="form-check-label small text-muted" for="rememberMe">Keep me logged in</label>
        </div>

        <button type="submit" class="btn btn-success w-100 btn-login mb-3">Sign In</button>
      </form>

      <p class="text-center mt-3 small text-muted">
        New student? <a href="#" class="text-decoration-none fw-bold">Register</a>
      </p>

    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const fullName = document.getElementById('nameInput').value;
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;

      if (fullName && email && password) {
        console.log("Session started for:", fullName);
        
        const btn = event.target.querySelector('button');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Authorizing...';
        btn.disabled = true;

        setTimeout(() => {
          // Redirecting to the dashboard
          window.location.href = 'dashboard.html'; 
        }, 1500);
      } else {
        alert("Please fill in all fields.");
      }
    });
  </script>
</body>
</html>
